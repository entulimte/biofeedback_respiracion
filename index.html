<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Cardiorrespiratorio</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent1: #38bdf8; /* Azul Intento 1 */
      --accent2: #f59e0b; /* Naranja Intento 2 */
      --text: #f8fafc;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 450px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
      box-sizing: border-box;
    }
    h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--accent1); }
    
    .form-group {
      display: flex;
      flex-direction: column;
      text-align: left;
      gap: 4px;
      margin-bottom: 10px;
    }
    label { font-size: 0.85rem; opacity: 0.9; }
    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    select { background: #334155; color: #fff; }
    button { background: var(--accent1); color: #0f172a; cursor: pointer; margin-top: 5px; }

    /* Pacer Respiratorio */
    .pacer-container {
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .pacer-circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: radial-gradient(circle, #38bdf8 0%, #0284c7 100%);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
      font-size: 1.1rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* Cam y Cronómetro */
    .cam-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    #videoPreview {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--accent1);
      object-fit: cover;
      background: #000;
    }
    .timer-badge {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent2);
      background: rgba(0,0,0,0.4);
      padding: 6px 15px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    /* Alerta de Dedo */
    #fingerAlert {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
      padding: 6px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 8px;
      display: none;
    }

    /* Gráfico EEG con 3 Zonas */
    .graph-container {
      position: relative;
      width: 100%;
      height: 120px;
      background: #020617;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid #334155;
    }
    canvas#ecgCanvas { width: 100%; height: 100%; display: block; }

    .zone-label {
      position: absolute;
      right: 5px;
      font-size: 0.65rem;
      font-weight: bold;
      opacity: 0.7;
    }

    /* Métricas */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }
    .metric-box {
      background: rgba(255,255,255,0.05);
      padding: 8px 4px;
      border-radius: 8px;
    }
    .metric-val { font-size: 1.3rem; font-weight: bold; color: var(--accent1); }
    .metric-label { font-size: 0.7rem; opacity: 0.8; }

    /* Tabla Comparativa */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.8rem;
    }
    th, td {
      border: 1px solid #334155;
      padding: 6px 2px;
      text-align: center;
    }
    th { background: rgba(255,255,255,0.05); color: var(--accent1); }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Configuración -->
  <div class="card" id="configCard">
    <h2>Configuración de Entrenamiento</h2>
    
    <div class="form-group">
      <label for="timeSelect">Tiempo del Ejercicio (Minutos):</label>
      <select id="timeSelect">
        <!-- Generado de 1 a 30 consecutivo -->
      </select>
    </div>

    <div class="form-group">
      <label for="rpmSelect">Ritmo de Respiración por Minuto:</label>
      <select id="rpmSelect">
        <option value="15" selected>Respiración Normal</option>
        <!-- Generado de 1 a 15 consecutivo -->
      </select>
    </div>
  </div>

  <!-- Pacer y Sensor -->
  <div class="card">
    <div id="fingerAlert">⚠️ Coloca bien el dedo sobre la cámara y el flash</div>
    
    <div class="cam-box">
      <video id="videoPreview" autoplay playsinline muted></video>
      <div class="timer-badge" id="timerDisplay">00:00</div>
    </div>

    <div class="pacer-container">
      <div id="pacerCircle" class="pacer-circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>

    <!-- Gráfica EEG con 3 Zonas de Color -->
    <div class="graph-container">
      <span class="zone-label" style="top: 2px; color: #ef4444;">>100 BPM</span>
      <span class="zone-label" style="top: 40px; color: #f59e0b;">70-100 BPM</span>
      <span class="zone-label" style="bottom: 2px; color: #10b981;"><70 BPM</span>
      <canvas id="ecgCanvas" width="350" height="120"></canvas>
    </div>

    <!-- Métricas -->
    <div class="metrics">
      <div class="metric-box">
        <div id="bpmVal" class="metric-val">--</div>
        <div class="metric-label">Actual</div>
      </div>
      <div class="metric-box">
        <div id="avgVal" class="metric-val">--</div>
        <div class="metric-label">Media</div>
      </div>
      <div class="metric-box">
        <div id="modeVal" class="metric-val">--</div>
        <div class="metric-label">Moda</div>
      </div>
    </div>

    <button id="startBtn">Iniciar Ejercicio</button>
  </div>

  <!-- Resumen y Cuadro Comparativo -->
  <div class="card" id="resultsCard" style="display:none;">
    <h2>Cuadro Comparativo</h2>
    <div id="tableContainer"></div>
  </div>

</div>

<canvas id="analyzerCanvas" width="100" height="100" style="display:none;"></canvas>

<script>
  // Populate Tiempo 1 a 30
  const timeSelect = document.getElementById('timeSelect');
  for (let i = 1; i <= 30; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} Minuto${i > 1 ? 's' : ''}`;
    if (i === 3) opt.selected = true;
    timeSelect.appendChild(opt);
  }

  // Populate RPM 1 a 15
  const rpmSelect = document.getElementById('rpmSelect');
  for (let i = 1; i <= 15; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} RPM (${i} respiración${i > 1 ? 'es' : ''}/min)`;
    rpmSelect.appendChild(opt);
  }

  let active = false;
  let videoTrack = null;
  let timerInterval = null;
  let frameInterval = null;
  let timeLeft = 0;
  let animPacer = null;
  
  let rValues = [];
  let times = [];
  let currentBpmHistory = [];
  const maxDataPoints = 120;
  let lastBpm = 0;
  let audioCtx = null;
  let lastBeepEpoch = 0;

  let sessionsData = []; 

  const video = document.getElementById('videoPreview');
  const canvas = document.getElementById('ecgCanvas');
  const ctx = canvas.getContext('2d');
  
  const analyzerCanvas = document.getElementById('analyzerCanvas');
  const aCtx = analyzerCanvas.getContext('2d');

  const pacerCircle = document.getElementById('pacerCircle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgVal = document.getElementById('avgVal');
  const modeVal = document.getElementById('modeVal');
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timerDisplay');
  const resultsCard = document.getElementById('resultsCard');
  const tableContainer = document.getElementById('tableContainer');
  const fingerAlert = document.getElementById('fingerAlert');

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // Pitido estricto espaciado con un intervalo mínimo de 600ms para garantizar el espacio real "bip... bip... bip"
  function playSpacedBeep() {
    if (!audioCtx || audioCtx.state !== 'running') return;
    
    const now = performance.now();
    if (now - lastBeepEpoch < 600) return; 
    lastBeepEpoch = now;

    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
      
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    } catch(e){}
  }

  function playFinishSound() {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.8);
    } catch(e){}
  }

  function calculateMode(arr) {
    if (arr.length === 0) return "--";
    const freqMap = {};
    let maxCount = 0;
    let mode = arr[0];

    for (const val of arr) {
      freqMap[val] = (freqMap[val] || 0) + 1;
      if (freqMap[val] > maxCount) {
        maxCount = freqMap[val];
        mode = val;
      }
    }
    return mode;
  }

  startBtn.addEventListener('click', async () => {
    initAudio();

    if (!active) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 300 },
            height: { ideal: 300 }
          }
        });

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        setTimeout(async () => {
          try { await videoTrack.applyConstraints({ advanced: [{ torch: true }] }); } catch (e) {}
        }, 100);

        active = true;
        currentBpmHistory = [];
        rValues = [];
        times = [];
        lastBpm = 0;
        lastBeepEpoch = 0;
        fingerAlert.style.display = "none";
        
        startBtn.textContent = "Detener Ejercicio";
        startBtn.style.background = "#ef4444";
        startBtn.style.color = "#fff";

        startTimer();
        startPacer();
        frameInterval = setInterval(processFrame, 1000 / 30);
      } catch (err) {
        alert("Error al acceder a la cámara trasera: " + err);
      }
    } else {
      stopSession(false);
    }
  });

  function startTimer() {
    timeLeft = parseInt(timeSelect.value) * 60;
    updateTimerText();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerText();
      if (timeLeft <= 0) {
        stopSession(true);
      }
    }, 1000);
  }

  function updateTimerText() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    timerDisplay.textContent = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
  }

  function processFrame() {
    if (!active || video.paused || video.ended) return;

    aCtx.drawImage(video, 0, 0, analyzerCanvas.width, analyzerCanvas.height);
    const imgData = aCtx.getImageData(0, 0, analyzerCanvas.width, analyzerCanvas.height);
    const data = imgData.data;

    let totalRed = 0;
    for (let i = 0; i < data.length; i += 4) {
      totalRed += data[i];
    }

    const avgRed = totalRed / (data.length / 4);

    if (avgRed < 80) {
      fingerAlert.style.display = "block";
      bpmVal.textContent = "--";
      avgVal.textContent = "--";
      modeVal.textContent = "--";
      return; 
    } else {
      fingerAlert.style.display = "none";
    }

    rValues.push(avgRed);
    times.push(performance.now());

    if (rValues.length > maxDataPoints) {
      rValues.shift();
      times.shift();
    }

    if (rValues.length >= 80) {
      calculateBPM();
    }

    drawZonedEEG();
  }

  function calculateBPM() {
    let peaks = [];
    let smoothValues = [];
    
    for (let i = 3; i < rValues.length - 3; i++) {
      let val = (rValues[i-3] + rValues[i-2] + rValues[i-1] + rValues[i] + rValues[i+1] + rValues[i+2] + rValues[i+3]) / 7;
      smoothValues.push({val: val, time: times[i]});
    }

    for (let i = 1; i < smoothValues.length - 1; i++) {
      if (smoothValues[i].val > smoothValues[i-1].val && smoothValues[i].val > smoothValues[i+1].val) {
        peaks.push(smoothValues[i].time);
      }
    }

    if (peaks.length >= 3) {
      let intervals = [];
      for (let i = 1; i < peaks.length; i++) {
        intervals.push(peaks[i] - peaks[i-1]);
      }
      
      const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      let bpm = Math.round(60000 / avgInterval);

      if (bpm >= 50 && bpm <= 150) {
        if (lastBpm === 0) lastBpm = bpm;
        lastBpm = Math.round(lastBpm * 0.9 + bpm * 0.1);
        
        bpmVal.textContent = lastBpm;
        currentBpmHistory.push(lastBpm);

        // Dispara el sonido con separación real de espacio
        playSpacedBeep();

        let sessionAvg = Math.round(currentBpmHistory.reduce((a,b)=>a+b,0) / currentBpmHistory.length);
        avgVal.textContent = sessionAvg;

        let sessionMode = calculateMode(currentBpmHistory);
        modeVal.textContent = sessionMode;
      }
    }
  }

  function drawZonedEEG() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    ctx.fillStyle = "rgba(239, 68, 68, 0.12)";
    ctx.fillRect(0, 0, w, h * 0.33);

    ctx.fillStyle = "rgba(245, 158, 11, 0.12)";
    ctx.fillRect(0, h * 0.33, w, h * 0.34);

    ctx.fillStyle = "rgba(16, 185, 129, 0.12)";
    ctx.fillRect(0, h * 0.67, w, h * 0.33);

    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.33); ctx.lineTo(w, h * 0.33);
    ctx.moveTo(0, h * 0.67); ctx.lineTo(w, h * 0.67);
    ctx.stroke();

    if (rValues.length < 2) return;

    const currentSessionNum = sessionsData.length + 1;
    const lineColor = (currentSessionNum % 2 !== 0) ? "#38bdf8" : "#f59e0b";

    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();

    let step = w / maxDataPoints;
    const minBpmVal = 50;
    const maxBpmVal = 120;

    for (let i = 0; i < rValues.length; i++) {
      let localBpm = lastBpm || 75; 
      
      let normalizedBpm = (localBpm - minBpmVal) / (maxBpmVal - minBpmVal);
      normalizedBpm = Math.max(0, Math.min(1, normalizedBpm));
      
      let waveOffset = (rValues[i] - rValues.reduce((a,b)=>a+b,0)/rValues.length);
      let y = (h - (normalizedBpm * h)) + (waveOffset * 0.5);
      
      y = Math.max(5, Math.min(h - 5, y));

      if (i === 0) ctx.moveTo(0, y);
      else ctx.lineTo(i * step, y);
    }
    ctx.stroke();
  }

  function startPacer() {
    let rpmVal = rpmSelect.value === "15" ? 15 : parseFloat(rpmSelect.value);
    const totalCycleMs = (60 / rpmVal) * 1000;
    const start = Date.now();

    function step() {
      if (!active) return;
      let elapsed = (Date.now() - start) % totalCycleMs;
      let prog = elapsed / totalCycleMs;

      if (prog < 0.4) {
        let phaseProg = prog / 0.4;
        let scale = 1 + (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Inhalar...";
      } else if (prog < 0.6) {
        pacerCircle.style.transform = `scale(2.5)`;
        pacerText.textContent = "Detener";
      } else {
        let phaseProg = (prog - 0.6) / 0.4;
        let scale = 2.5 - (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Exhalar...";
      }

      animPacer = requestAnimationFrame(step);
    }
    step();
  }

  function stopSession(completed) {
    active = false;
    clearInterval(frameInterval);
    clearInterval(timerInterval);
    cancelAnimationFrame(animPacer);

    if (videoTrack) { 
      try { 
        videoTrack.applyConstraints({ advanced: [{ torch: false }] });
        videoTrack.stop(); 
      } catch(e){} 
    }
    if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
    video.srcObject = null;

    pacerCircle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    startBtn.textContent = "Iniciar Ejercicio";
    startBtn.style.background = "#38bdf8";
    startBtn.style.color = "#0f172a";
    fingerAlert.style.display = "none";

    let finalAvg = currentBpmHistory.length > 0 
      ? Math.round(currentBpmHistory.reduce((a,b)=>a+b,0)/currentBpmHistory.length)
      : "--";

    let finalMode = calculateMode(currentBpmHistory);
    let selectedRpmText = rpmSelect.options[rpmSelect.selectedIndex].text;

    sessionsData.push({
      num: sessionsData.length + 1,
      time: timeSelect.value + " min",
      rpm: selectedRpmText,
      avgBpm: finalAvg,
      modeBpm: finalMode
    });

    renderResultsTable();

    if (completed) {
      if ("vibrate" in navigator) {
        navigator.vibrate([200, 100, 200, 100, 400]);
      }
      playFinishSound();
      
      setTimeout(() => {
        alert("¡Tiempo de entrenamiento finalizado!");
      }, 100);
    }
  }

  function renderResultsTable() {
    resultsCard.style.display = "block";
    let html = `
      <table>
        <thead>
          <tr>
            <th>Intento</th>
            <th>Tiempo</th>
            <th>Ritmo</th>
            <th>Media</th>
            <th>Moda</th>
          </tr>
        </thead>
        <tbody>
    `;

    sessionsData.forEach((s) => {
      let isFirst = (s.num % 2 !== 0);
      let color = isFirst ? '#38bdf8' : '#f59e0b';
      html += `
        <tr>
          <td style="color:${color}; font-weight:bold;">#${s.num} ${isFirst ? '(Azul)' : '(Naranja)'}</td>
          <td>${s.time}</td>
          <td>${s.rpm}</td>
          <td style="color:${color}; font-weight:bold;">${s.avgBpm} BPM</td>
          <td style="color:${color}; font-weight:bold;">${s.modeBpm} BPM</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    tableContainer.innerHTML = html;
  }
</script>
</body>
</html>
