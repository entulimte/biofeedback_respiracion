<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Cardiorrespiratorio</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 450px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
    }
    h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); }
    
    /* Pacer Visual */
    .pacer-container {
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .pacer-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #38bdf8 0%, #0284c7 100%);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* Video y Flash */
    #video { display: none; }
    .cam-preview {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      margin: 0 auto 10px;
      object-fit: cover;
      background: #000;
    }

    /* Métricas */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric-box {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
    }
    .metric-val { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
    .metric-label { font-size: 0.8rem; opacity: 0.8; }

    /* Botones y Controles */
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 5px;
    }
    select { background: #334155; color: #fff; }
    button { background: var(--accent); color: #0f172a; }
    button:disabled { opacity: 0.5; }

    canvas { width: 100%; height: 80px; background: #020617; border-radius: 8px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Pacer de Respiración</h2>
    <label for="rpm">Ritmo (Respiraciones por Minuto):</label>
    <select id="rpm">
      <option value="6" selected>6 RPM (Coherencia Cardíaca)</option>
      <option value="5.5">5.5 RPM</option>
      <option value="5">5 RPM</option>
      <option value="4.5">4.5 RPM</option>
    </select>
    
    <div class="pacer-container">
      <div id="pacerCircle" class="pacer-circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>
  </div>

  <div class="card">
    <h2>Sensor de Pulso (Cámara)</h2>
    <p style="font-size:0.85rem; opacity:0.8;">Coloca suavemente la yema de tu dedo sobre la cámara trasera para cubrirla junto con el flash.</p>
    
    <video id="video" playsinline></video>
    <canvas id="camCanvas" width="50" height="50" style="display:none;"></canvas>
    
    <div class="metrics">
      <div class="metric-box">
        <div id="bpmVal" class="metric-val">--</div>
        <div class="metric-label">BPM Actual</div>
      </div>
      <div class="metric-box">
        <div id="avgBpmVal" class="metric-val">--</div>
        <div class="metric-label">Promedio Sesión</div>
      </div>
    </div>

    <canvas id="ecgGraph" width="300" height="80" style="margin-top:10px;"></canvas>

    <button id="startBtn">Iniciar Biofeedback</button>
  </div>
</div>

<script>
  let streaming = false;
  let videoTrack = null;
  let pacerInterval = null;
  let bpmHistory = [];
  
  const video = document.getElementById('video');
  const camCanvas = document.getElementById('camCanvas');
  const camCtx = camCanvas.getContext('2d');
  const ecgCanvas = document.getElementById('ecgGraph');
  const ecgCtx = ecgCanvas.getContext('2d');
  
  const pacerCircle = document.getElementById('pacerCircle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgBpmVal = document.getElementById('avgBpmVal');
  const startBtn = document.getElementById('startBtn');
  const rpmSelect = document.getElementById('rpm');

  let rawSignals = [];
  let lastBeatTime = Date.now();
  let beats = [];

  // Iniciar / Detener
  startBtn.addEventListener('click', async () => {
    if (!streaming) {
      await startCamera();
      startPacer();
      startBtn.textContent = "Detener Sesión";
      startBtn.style.background = "#ef4444";
      streaming = true;
    } else {
      stopSession();
    }
  });

  // Activar Cámara y Flash
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", torch: true }
      });
      video.srcObject = stream;
      await video.play();
      
      videoTrack = stream.getVideoTracks()[0];
      // Intentar encender el flash si el cel lo soporta
      try {
        await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
      } catch (e) {
        console.log("Flash no soportado directamente:", e);
      }

      requestAnimationFrame(processVideoFrame);
    } catch (err) {
      alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos correspondientes: " + err);
    }
  }

  // Procesamiento de Señal PPG (Color Rojo)
  function processVideoFrame() {
    if (!streaming) return;

    camCtx.drawImage(video, 0, 0, 50, 50);
    const frame = camCtx.getImageData(0, 0, 50, 50);
    let redSum = 0;

    for (let i = 0; i < frame.data.length; i += 4) {
      redSum += frame.data[i]; // Canal Rojo
    }

    const redAvg = redSum / (frame.data.length / 4);
    detectPulse(redAvg);
    drawECG(redAvg);

    requestAnimationFrame(processVideoFrame);
  }

  // Detección simple de picos para BPM
  function detectPulse(val) {
    rawSignals.push(val);
    if (rawSignals.length > 100) rawSignals.shift();

    const avg = rawSignals.reduce((a, b) => a + b, 0) / rawSignals.length;
    const now = Date.now();

    if (val > avg + 1.5 && (now - lastBeatTime) > 450) { // Umbral de latido (~130 BPM max)
      const currentBpm = Math.round(60000 / (now - lastBeatTime));
      if (currentBpm >= 40 && currentBpm <= 180) {
        bpmVal.textContent = currentBpm;
        bpmHistory.push(currentBpm);
        
        // Promedio
        const avgBpm = Math.round(bpmHistory.reduce((a, b) => a + b, 0) / bpmHistory.length);
        avgBpmVal.textContent = avgBpm;
      }
      lastBeatTime = now;
    }
  }

  // Gráfica visual ECG
  function drawECG(val) {
    ecgCtx.fillStyle = "#020617";
    ecgCtx.fillRect(0, 0, ecgCanvas.width, ecgCanvas.height);
    
    ecgCtx.strokeStyle = "#38bdf8";
    ecgCtx.lineWidth = 2;
    ecgCtx.beginPath();
    
    const step = ecgCanvas.width / rawSignals.length;
    for (let i = 0; i < rawSignals.length; i++) {
      const y = ecgCanvas.height - ((rawSignals[i] - 100) * 1.5);
      if (i === 0) ecgCtx.moveTo(0, y);
      else ecgCtx.lineTo(i * step, y);
    }
    ecgCtx.stroke();
  }

  // Pacer de Respiración Visual
  function startPacer() {
    const rpm = parseFloat(rpmSelect.value);
    const cycleTimeMs = (60 / rpm) * 1000; 
    let startTime = Date.now();

    pacerInterval = setInterval(() => {
      const elapsed = (Date.now() - startTime) % cycleTimeMs;
      const progress = elapsed / cycleTimeMs;

      if (progress < 0.5) {
        // Inhalar (0 a 1)
        const scale = 1 + (progress * 2) * 1.8;
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Inhala...";
      } else {
        // Exhalar (1 a 0)
        const scale = 1 + ((1 - progress) * 2) * 1.8;
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Exhala...";
      }
    }, 50);
  }

  function stopSession() {
    streaming = false;
    if (videoTrack) videoTrack.stop();
    clearInterval(pacerInterval);
    pacerCircle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    startBtn.textContent = "Iniciar Biofeedback";
    startBtn.style.background = "#38bdf8";
  }
</script>
</body>
</html>
