<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Respiratorio</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 15px;
    }
    /* Pelota / Pacer */
    .pacer-box {
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #38bdf8;
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
    }
    /* Cámara donde pones el dedo */
    #videoPreview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      object-fit: cover;
      background: #000;
    }
    /* Lecturas BPM */
    .metrics {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
    }
    .val { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
    
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      margin-top: 10px;
    }
    select { background: #334155; color: #fff; }
    button { background: #38bdf8; color: #000; cursor: pointer; }
  </style>
</head>
<body>

  <!-- Pacer de la Pelota -->
  <div class="card">
    <label for="rpm">Ritmo RPM:</label>
    <select id="rpm">
      <option value="6" selected>6 RPM</option>
      <option value="5.5">5.5 RPM</option>
      <option value="5">5 RPM</option>
    </select>

    <div class="pacer-box">
      <div id="circle" class="circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>
  </div>

  <!-- Cámara y Pulso -->
  <div class="card">
    <video id="videoPreview" autoplay playsinline muted></video>
    <canvas id="canvas" width="50" height="50" style="display:none;"></canvas>

    <div class="metrics">
      <div>
        <div id="bpmVal" class="val">--</div>
        <small>BPM Actual</small>
      </div>
      <div>
        <div id="avgVal" class="val">--</div>
        <small>Promedio</small>
      </div>
    </div>

    <button id="btn">Iniciar</button>
  </div>

<script>
  let active = false;
  let track = null;
  let bpmHistory = [];
  let lastBeat = Date.now();
  let raw = [];
  let anim = null;

  const video = document.getElementById('videoPreview');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const circle = document.getElementById('circle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgVal = document.getElementById('avgVal');
  const btn = document.getElementById('btn');
  const rpmSelect = document.getElementById('rpm');

  btn.addEventListener('click', async () => {
    if (!active) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
        try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e){}

        active = true;
        btn.textContent = "Detener";
        btn.style.background = "#ef4444";
        btn.style.color = "#fff";

        runPacer();
        process();
      } catch (err) {
        alert("Error al abrir cámara: " + err);
      }
    } else {
      stop();
    }
  });

  function process() {
    if (!active) return;
    ctx.drawImage(video, 0, 0, 50, 50);
    const frame = ctx.getImageData(0, 0, 50, 50);
    let sum = 0;
    for (let i = 0; i < frame.data.length; i += 4) sum += frame.data[i];
    let avg = sum / (frame.data.length / 4);

    raw.push(avg);
    if (raw.length > 50) raw.shift();
    let mean = raw.reduce((a,b)=>a+b,0)/raw.length;

    let now = Date.now();
    if (avg > mean + 1 && (now - lastBeat) > 400) {
      let bpm = Math.round(60000 / (now - lastBeat));
      if (bpm >= 40 && bpm <= 180) {
        bpmVal.textContent = bpm;
        bpmHistory.push(bpm);
        avgVal.textContent = Math.round(bpmHistory.reduce((a,b)=>a+b,0) / bpmHistory.length);
      }
      lastBeat = now;
    }
    requestAnimationFrame(process);
  }

  function runPacer() {
    const rpm = parseFloat(rpmSelect.value);
    const ms = (60 / rpm) * 1000;
    const start = Date.now();

    function step() {
      if (!active) return;
      let elapsed = (Date.now() - start) % ms;
      let prog = elapsed / ms;

      if (prog < 0.5) {
        circle.style.transform = `scale(${1 + (prog * 2) * 1.5})`;
        pacerText.textContent = "Inhala";
      } else {
        circle.style.transform = `scale(${1 + ((1 - prog) * 2) * 1.5})`;
        pacerText.textContent = "Exhala";
      }
      anim = requestAnimationFrame(step);
    }
    step();
  }

  function stop() {
    active = false;
    if (track) track.stop();
    cancelAnimationFrame(anim);
    circle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    btn.textContent = "Iniciar";
    btn.style.background = "#38bdf8";
    btn.style.color = "#000";
  }
</script>
</body>
</html>
