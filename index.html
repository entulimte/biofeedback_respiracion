<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Cardiorrespiratorio</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent1: #38bdf8; /* Azul Intento 1 */
      --accent2: #f59e0b; /* Naranja Intento 2 */
      --text: #f8fafc;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 450px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
      box-sizing: border-box;
    }
    h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--accent1); }
    
    .form-group {
      display: flex;
      flex-direction: column;
      text-align: left;
      gap: 4px;
      margin-bottom: 10px;
    }
    label { font-size: 0.85rem; opacity: 0.9; }
    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    select { background: #334155; color: #fff; }
    button { background: var(--accent1); color: #0f172a; cursor: pointer; margin-top: 5px; }

    /* Pacer Respiratorio */
    .pacer-container {
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .pacer-circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: radial-gradient(circle, #38bdf8 0%, #0284c7 100%);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
      font-size: 1.1rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* Cam y Cronómetro */
    .cam-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    #videoPreview {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--accent1);
      object-fit: cover;
      background: #000;
    }
    .timer-badge {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent2);
      background: rgba(0,0,0,0.4);
      padding: 6px 15px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    /* Gráfico EEG con 3 Zonas */
    .graph-container {
      position: relative;
      width: 100%;
      height: 120px;
      background: #020617;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid #334155;
    }
    canvas { width: 100%; height: 100%; display: block; }

    .zone-label {
      position: absolute;
      right: 5px;
      font-size: 0.65rem;
      font-weight: bold;
      opacity: 0.7;
    }

    /* Métricas */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .metric-box {
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 8px;
    }
    .metric-val { font-size: 1.5rem; font-weight: bold; color: var(--accent1); }
    .metric-label { font-size: 0.75rem; opacity: 0.8; }

    /* Tabla Comparativa */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border: 1px solid #334155;
      padding: 8px 4px;
      text-align: center;
    }
    th { background: rgba(255,255,255,0.05); color: var(--accent1); }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Configuración -->
  <div class="card" id="configCard">
    <h2>Configuración de Entrenamiento</h2>
    
    <div class="form-group">
      <label for="timeSelect">Tiempo del Ejercicio (Minutos):</label>
      <select id="timeSelect">
        <!-- Generado exactamente de 1 a 30 consecutivo -->
      </select>
    </div>

    <div class="form-group">
      <label for="rpmSelect">Ritmo de Respiración por Minuto:</label>
      <select id="rpmSelect">
        <option value="15" selected>Respiración Normal</option>
        <!-- Generado exactamente de 1 a 15 consecutivo -->
      </select>
    </div>
  </div>

  <!-- Pacer y Sensor -->
  <div class="card">
    <div class="cam-box">
      <video id="videoPreview" autoplay playsinline muted></video>
      <div class="timer-badge" id="timerDisplay">00:00</div>
    </div>

    <div class="pacer-container">
      <div id="pacerCircle" class="pacer-circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>

    <!-- Gráfica EEG con 3 Zonas de Color -->
    <div class="graph-container">
      <span class="zone-label" style="top: 2px; color: #ef4444;">>100 BPM (Roja)</span>
      <span class="zone-label" style="top: 40px; color: #f59e0b;">70-100 BPM (Amarilla)</span>
      <span class="zone-label" style="bottom: 2px; color: #10b981;"><70 BPM (Verde)</span>
      <canvas id="ecgCanvas" width="350" height="120"></canvas>
    </div>

    <div class="metrics">
      <div class="metric-box">
        <div id="bpmVal" class="metric-val">--</div>
        <div class="metric-label">BPM Actual</div>
      </div>
      <div class="metric-box">
        <div id="avgVal" class="metric-val">--</div>
        <div class="metric-label">Promedio Sesión</div>
      </div>
    </div>

    <button id="startBtn">Iniciar Ejercicio</button>
  </div>

  <!-- Resumen y Cuadro Comparativo -->
  <div class="card" id="resultsCard" style="display:none;">
    <h2>Cuadro Comparativo</h2>
    <div id="tableContainer"></div>
  </div>

</div>

<script>
  // Populate Tiempo consecutivo 1 a 30
  const timeSelect = document.getElementById('timeSelect');
  for (let i = 1; i <= 30; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} Minuto${i > 1 ? 's' : ''}`;
    if (i === 3) opt.selected = true;
    timeSelect.appendChild(opt);
  }

  // Populate RPM consecutivo 1 a 15
  const rpmSelect = document.getElementById('rpmSelect');
  for (let i = 1; i <= 15; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} RPM (${i} respiración${i > 1 ? 'es' : ''}/min)`;
    rpmSelect.appendChild(opt);
  }

  let active = false;
  let track = null;
  let timerInterval = null;
  let timeLeft = 0;
  let animPacer = null;
  
  let rawSignals = [];
  let smoothedSignals = [];
  let currentBpmHistory = [];
  let lastBeat = Date.now();

  let sessionsData = []; 

  const video = document.getElementById('videoPreview');
  const canvas = document.getElementById('ecgCanvas');
  const ctx = canvas.getContext('2d');
  
  const hiddenCanvas = document.createElement('canvas');
  hiddenCanvas.width = 50; hiddenCanvas.height = 50;
  const hCtx = hiddenCanvas.getContext('2d');

  const pacerCircle = document.getElementById('pacerCircle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgVal = document.getElementById('avgVal');
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timerDisplay');
  const resultsCard = document.getElementById('resultsCard');
  const tableContainer = document.getElementById('tableContainer');

  startBtn.addEventListener('click', async () => {
    if (!active) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
        try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e){}

        active = true;
        currentBpmHistory = [];
        rawSignals = [];
        smoothedSignals = [];
        
        startBtn.textContent = "Detener Ejercicio";
        startBtn.style.background = "#ef4444";
        startBtn.style.color = "#fff";

        startTimer();
        startPacer();
        processFrame();
      } catch (err) {
        alert("Error al acceder a la cámara: " + err);
      }
    } else {
      stopSession(false);
    }
  });

  function startTimer() {
    timeLeft = parseInt(timeSelect.value) * 60;
    updateTimerText();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerText();
      if (timeLeft <= 0) {
        stopSession(true);
      }
    }, 1000);
  }

  function updateTimerText() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    timerDisplay.textContent = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
  }

  // PROCESAMIENTO ESTABILIZADO Y FILTRADO
  function processFrame() {
    if (!active) return;

    hCtx.drawImage(video, 0, 0, 50, 50);
    const frame = hCtx.getImageData(0, 0, 50, 50);
    let sum = 0;
    for (let i = 0; i < frame.data.length; i += 4) {
      sum += frame.data[i];
    }
    let avg = sum / (frame.data.length / 4);

    rawSignals.push(avg);
    if (rawSignals.length > 50) rawSignals.shift();

    // Filtro de suavizado exponencial
    let lastSmooth = smoothedSignals.length > 0 ? smoothedSignals[smoothedSignals.length - 1] : avg;
    let smoothedVal = lastSmooth + 0.25 * (avg - lastSmooth);
    smoothedSignals.push(smoothedVal);
    if (smoothedSignals.length > 50) smoothedSignals.shift();

    let mean = smoothedSignals.reduce((a,b)=>a+b,0) / smoothedSignals.length;
    let now = Date.now();

    // Umbral de detección con tiempo refractario seguro (500ms = Máximo 120 BPM)
    if (smoothedVal > mean + 0.6 && (now - lastBeat) > 500) {
      let bpm = Math.round(60000 / (now - lastBeat));
      if (bpm >= 45 && bpm <= 140) {
        bpmVal.textContent = bpm;
        currentBpmHistory.push(bpm);
        let sessionAvg = Math.round(currentBpmHistory.reduce((a,b)=>a+b,0) / currentBpmHistory.length);
        avgVal.textContent = sessionAvg;
      }
      lastBeat = now;
    }

    drawZonedEEG();
    requestAnimationFrame(processFrame);
  }

  function drawZonedEEG() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Zonas de fondo
    ctx.fillStyle = "rgba(239, 68, 68, 0.12)";
    ctx.fillRect(0, 0, w, h * 0.33);

    ctx.fillStyle = "rgba(245, 158, 11, 0.12)";
    ctx.fillRect(0, h * 0.33, w, h * 0.34);

    ctx.fillStyle = "rgba(16, 185, 129, 0.12)";
    ctx.fillRect(0, h * 0.67, w, h * 0.33);

    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.33); ctx.lineTo(w, h * 0.33);
    ctx.moveTo(0, h * 0.67); ctx.lineTo(w, h * 0.67);
    ctx.stroke();

    if (smoothedSignals.length < 2) return;

    const currentSessionNum = sessionsData.length + 1;
    const lineColor = (currentSessionNum % 2 !== 0) ? "#38bdf8" : "#f59e0b";

    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();

    let step = w / 50;
    let min = Math.min(...smoothedSignals);
    let max = Math.max(...smoothedSignals);
    let range = (max - min) || 1;

    for (let i = 0; i < smoothedSignals.length; i++) {
      let norm = (smoothedSignals[i] - min) / range;
      let y = h - (norm * (h - 20) + 10);
      if (i === 0) ctx.moveTo(0, y);
      else ctx.lineTo(i * step, y);
    }
    ctx.stroke();
  }

  function startPacer() {
    let rpmVal = rpmSelect.value === "15" ? 15 : parseFloat(rpmSelect.value);
    const totalCycleMs = (60 / rpmVal) * 1000;
    const start = Date.now();

    function step() {
      if (!active) return;
      let elapsed = (Date.now() - start) % totalCycleMs;
      let prog = elapsed / totalCycleMs;

      if (prog < 0.4) {
        let phaseProg = prog / 0.4;
        let scale = 1 + (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Inhalar...";
      } else if (prog < 0.6) {
        pacerCircle.style.transform = `scale(2.5)`;
        pacerText.textContent = "Detener";
      } else {
        let phaseProg = (prog - 0.6) / 0.4;
        let scale = 2.5 - (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Exhalar...";
      }

      animPacer = requestAnimationFrame(step);
    }
    step();
  }

  function stopSession(completed) {
    active = false;
    if (track) track.stop();
    clearInterval(timerInterval);
    cancelAnimationFrame(animPacer);

    pacerCircle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    startBtn.textContent = "Iniciar Ejercicio";
    startBtn.style.background = "#38bdf8";
    startBtn.style.color = "#0f172a";

    let finalAvg = currentBpmHistory.length > 0 
      ? Math.round(currentBpmHistory.reduce((a,b)=>a+b,0)/currentBpmHistory.length)
      : "--";

    let selectedRpmText = rpmSelect.options[rpmSelect.selectedIndex].text;

    sessionsData.push({
      num: sessionsData.length + 1,
      time: timeSelect.value + " min",
      rpm: selectedRpmText,
      avgBpm: finalAvg
    });

    renderResultsTable();
    if (completed) alert("¡Tiempo de entrenamiento finalizado!");
  }

  function renderResultsTable() {
    resultsCard.style.display = "block";
    let html = `
      <table>
        <thead>
          <tr>
            <th>Intento</th>
            <th>Tiempo</th>
            <th>Ritmo</th>
            <th>Promedio BPM</th>
          </tr>
        </thead>
        <tbody>
    `;

    sessionsData.forEach((s) => {
      let isFirst = (s.num % 2 !== 0);
      let color = isFirst ? '#38bdf8' : '#f59e0b';
      html += `
        <tr>
          <td style="color:${color}; font-weight:bold;">#${s.num} ${isFirst ? '(Azul)' : '(Naranja)'}</td>
          <td>${s.time}</td>
          <td>${s.rpm}</td>
          <td style="color:${color}; font-weight:bold; font-size:1.1rem;">${s.avgBpm} BPM</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    tableContainer.innerHTML = html;
  }
</script>
</body>
</html>
