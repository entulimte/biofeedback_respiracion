<script>
  // Populate Tiempo 1 a 30
  const timeSelect = document.getElementById('timeSelect');
  for (let i = 1; i <= 30; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} Minuto${i > 1 ? 's' : ''}`;
    if (i === 3) opt.selected = true;
    timeSelect.appendChild(opt);
  }

  // Populate RPM 1 a 15
  const rpmSelect = document.getElementById('rpmSelect');
  for (let i = 1; i <= 15; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i} RPM (${i} respiración${i > 1 ? 'es' : ''}/min)`;
    rpmSelect.appendChild(opt);
  }

  let active = false;
  let videoTrack = null;
  let timerInterval = null;
  let frameInterval = null;
  let timeLeft = 0;
  let animPacer = null;
  
  // PARÁMETROS DE MEDICIÓN
  let rValues = [];
  let times = [];
  let currentBpmHistory = [];
  const maxDataPoints = 120;
  let lastBpm = 0;

  let sessionsData = []; 

  const video = document.getElementById('videoPreview');
  const canvas = document.getElementById('ecgCanvas');
  const ctx = canvas.getContext('2d');
  
  const analyzerCanvas = document.getElementById('analyzerCanvas');
  const aCtx = analyzerCanvas.getContext('2d');

  const pacerCircle = document.getElementById('pacerCircle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgVal = document.getElementById('avgVal');
  const modeVal = document.getElementById('modeVal');
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timerDisplay');
  const resultsCard = document.getElementById('resultsCard');
  const tableContainer = document.getElementById('tableContainer');

  function playFinishSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.8);
    } catch(e){}
  }

  function calculateMode(arr) {
    if (arr.length === 0) return "--";
    const freqMap = {};
    let maxCount = 0;
    let mode = arr[0];

    for (const val of arr) {
      freqMap[val] = (freqMap[val] || 0) + 1;
      if (freqMap[val] > maxCount) {
        maxCount = freqMap[val];
        mode = val;
      }
    }
    return mode;
  }

  startBtn.addEventListener('click', async () => {
    if (!active) {
      try {
        // CORRECCIÓN: Solicitud robusta asegurando la cámara trasera y preparando el flujo de antorcha
        const constraints = {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 300 },
            height: { ideal: 300 }
          }
        };

        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
          // Fallback por si el dispositivo no soporta 'exact: environment'
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "environment",
              width: { ideal: 300 },
              height: { ideal: 300 }
            }
          });
        }

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        // CORRECCIÓN: Activación directa y segura de la linterna (torch) con verificación de capacidades
        const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        if (capabilities.torch) {
          try {
            await videoTrack.applyConstraints({
              advanced: [{ torch: true }]
            });
          } catch (err) {
            console.warn("No se pudo encender el flash mediante applyConstraints:", err);
          }
        } else {
          // Fallback para navegadores que permiten aplicar torch directamente sin getCapabilities previo
          setTimeout(async () => {
            try {
              await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
            } catch (e) {
              console.warn("Fallback torch error:", e);
            }
          }, 300);
        }

        active = true;
        currentBpmHistory = [];
        rValues = [];
        times = [];
        lastBpm = 0;
        
        startBtn.textContent = "Detener Ejercicio";
        startBtn.style.background = "#ef4444";
        startBtn.style.color = "#fff";

        startTimer();
        startPacer();
        frameInterval = setInterval(processFrame, 1000 / 30);
      } catch (err) {
        alert("Error al acceder a la cámara trasera o flash: " + err);
      }
    } else {
      stopSession(false);
    }
  });

  function startTimer() {
    timeLeft = parseInt(timeSelect.value) * 60;
    updateTimerText();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerText();
      if (timeLeft <= 0) {
        stopSession(true);
      }
    }, 1000);
  }

  function updateTimerText() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    timerDisplay.textContent = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
  }

  // --- ALGORITMO DE PROCESAMIENTO ---
  function processFrame() {
    if (!active || video.paused || video.ended) return;

    aCtx.drawImage(video, 0, 0, analyzerCanvas.width, analyzerCanvas.height);
    const imgData = aCtx.getImageData(0, 0, analyzerCanvas.width, analyzerCanvas.height);
    const data = imgData.data;

    let totalRed = 0;
    for (let i = 0; i < data.length; i += 4) {
      totalRed += data[i];
    }

    const avgRed = totalRed / (data.length / 4);
    rValues.push(avgRed);
    times.push(performance.now());

    if (rValues.length > maxDataPoints) {
      rValues.shift();
      times.shift();
    }

    if (rValues.length >= 80) {
      calculateBPM();
    }

    drawZonedEEG();
  }

  function calculateBPM() {
    let peaks = [];
    let smoothValues = [];
    
    // Suavizado de 7 puntos
    for (let i = 3; i < rValues.length - 3; i++) {
      let val = (rValues[i-3] + rValues[i-2] + rValues[i-1] + rValues[i] + rValues[i+1] + rValues[i+2] + rValues[i+3]) / 7;
      smoothValues.push({val: val, time: times[i]});
    }

    for (let i = 1; i < smoothValues.length - 1; i++) {
      if (smoothValues[i].val > smoothValues[i-1].val && smoothValues[i].val > smoothValues[i+1].val) {
        peaks.push(smoothValues[i].time);
      }
    }

    if (peaks.length >= 3) {
      let intervals = [];
      for (let i = 1; i < peaks.length; i++) {
        intervals.push(peaks[i] - peaks[i-1]);
      }
      
      const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      let bpm = Math.round(60000 / avgInterval);

      // Rango de 50 a 150 BPM con Amortiguación al 10%
      if (bpm >= 50 && bpm <= 150) {
        if (lastBpm === 0) lastBpm = bpm;
        lastBpm = Math.round(lastBpm * 0.9 + bpm * 0.1);
        
        bpmVal.textContent = lastBpm;
        currentBpmHistory.push(lastBpm);

        let sessionAvg = Math.round(currentBpmHistory.reduce((a,b)=>a+b,0) / currentBpmHistory.length);
        avgVal.textContent = sessionAvg;

        let sessionMode = calculateMode(currentBpmHistory);
        modeVal.textContent = sessionMode;
      }
    }
  }

  function drawZonedEEG() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    ctx.fillStyle = "rgba(239, 68, 68, 0.12)";
    ctx.fillRect(0, 0, w, h * 0.33);

    ctx.fillStyle = "rgba(245, 158, 11, 0.12)";
    ctx.fillRect(0, h * 0.33, w, h * 0.34);

    ctx.fillStyle = "rgba(16, 185, 129, 0.12)";
    ctx.fillRect(0, h * 0.67, w, h * 0.33);

    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.33); ctx.lineTo(w, h * 0.33);
    ctx.moveTo(0, h * 0.67); ctx.lineTo(w, h * 0.67);
    ctx.stroke();

    if (rValues.length < 2) return;

    const currentSessionNum = sessionsData.length + 1;
    const lineColor = (currentSessionNum % 2 !== 0) ? "#38bdf8" : "#f59e0b";

    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();

    let step = w / maxDataPoints;
    let min = Math.min(...rValues);
    let max = Math.max(...rValues);
    let range = (max - min) || 1;

    for (let i = 0; i < rValues.length; i++) {
      let norm = (rValues[i] - min) / range;
      let y = h - (norm * (h - 20) + 10);
      if (i === 0) ctx.moveTo(0, y);
      else ctx.lineTo(i * step, y);
    }
    ctx.stroke();
  }

  function startPacer() {
    let rpmVal = rpmSelect.value === "15" ? 15 : parseFloat(rpmSelect.value);
    const totalCycleMs = (60 / rpmVal) * 1000;
    const start = Date.now();

    function step() {
      if (!active) return;
      let elapsed = (Date.now() - start) % totalCycleMs;
      let prog = elapsed / totalCycleMs;

      if (prog < 0.4) {
        let phaseProg = prog / 0.4;
        let scale = 1 + (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Inhalar...";
      } else if (prog < 0.6) {
        pacerCircle.style.transform = `scale(2.5)`;
        pacerText.textContent = "Detener";
      } else {
        let phaseProg = (prog - 0.6) / 0.4;
        let scale = 2.5 - (phaseProg * 1.5);
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Exhalar...";
      }

      animPacer = requestAnimationFrame(step);
    }
    step();
  }

  function stopSession(completed) {
    active = false;
    clearInterval(frameInterval);
    clearInterval(timerInterval);
    cancelAnimationFrame(animPacer);

    if (videoTrack) { 
      try { 
        // Apagar la antorcha al detener la sesión
        videoTrack.applyConstraints({ advanced: [{ torch: false }] });
        videoTrack.stop(); 
      } catch(e){} 
    }
    if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
    video.srcObject = null;

    pacerCircle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    startBtn.textContent = "Iniciar Ejercicio";
    startBtn.style.background = "#38bdf8";
    startBtn.style.color = "#0f172a";

    let finalAvg = currentBpmHistory.length > 0 
      ? Math.round(currentBpmHistory.reduce((a,b)=>a+b,0)/currentBpmHistory.length)
      : "--";

    let finalMode = calculateMode(currentBpmHistory);
    let selectedRpmText = rpmSelect.options[rpmSelect.selectedIndex].text;

    sessionsData.push({
      num: sessionsData.length + 1,
      time: timeSelect.value + " min",
      rpm: selectedRpmText,
      avgBpm: finalAvg,
      modeBpm: finalMode
    });

    renderResultsTable();

    if (completed) {
      if ("vibrate" in navigator) {
        navigator.vibrate([200, 100, 200, 100, 400]);
      }
      playFinishSound();
      
      setTimeout(() => {
        alert("¡Tiempo de entrenamiento finalizado!");
      }, 100);
    }
  }

  function renderResultsTable() {
    resultsCard.style.display = "block";
    let html = `
      <table>
        <thead>
          <tr>
            <th>Intento</th>
            <th>Tiempo</th>
            <th>Ritmo</th>
            <th>Media</th>
            <th>Moda</th>
          </tr>
        </thead>
        <tbody>
    `;

    sessionsData.forEach((s) => {
      let isFirst = (s.num % 2 !== 0);
      let color = isFirst ? '#38bdf8' : '#f59e0b';
      html += `
        <tr>
          <td style="color:${color}; font-weight:bold;">#${s.num} ${isFirst ? '(Azul)' : '(Naranja)'}</td>
          <td>${s.time}</td>
          <td>${s.rpm}</td>
          <td style="color:${color}; font-weight:bold;">${s.avgBpm} BPM</td>
          <td style="color:${color}; font-weight:bold;">${s.modeBpm} BPM</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    tableContainer.innerHTML = html;
  }
</script>
