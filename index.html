<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Cardiorrespiratorio</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .pacer-box {
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #38bdf8;
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
    }
    #videoPreview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      object-fit: cover;
      background: #000;
      margin: 0 auto;
    }
    .metrics {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
    }
    .val { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
    
    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      margin-top: 8px;
      box-sizing: border-box;
    }
    select { background: #334155; color: #fff; }
    button { background: #38bdf8; color: #000; cursor: pointer; font-size: 1.1rem; }
    .timer-display { font-size: 1.4rem; font-weight: bold; color: #f59e0b; margin-top: 5px; }
  </style>
</head>
<body>

  <!-- Pacer y Tiempos -->
  <div class="card">
    <label>Duración de la Sesión:</label>
    <select id="sessionTime">
      <option value="1">1 Minuto</option>
      <option value="2">2 Minutos</option>
      <option value="3">3 Minutos</option>
      <option value="5" selected>5 Minutos</option>
      <option value="10">10 Minutos</option>
      <option value="15">15 Minutos</option>
      <option value="20">20 Minutos</option>
      <option value="30">30 Minutos</option>
    </select>

    <label style="margin-top:10px; display:block;">Ritmo de Respiración (RPM):</label>
    <select id="rpm">
      <option value="15">15 RPM (Respiración Normal)</option>
      <option value="12">12 RPM</option>
      <option value="10">10 RPM</option>
      <option value="8">8 RPM</option>
      <option value="6" selected>6 RPM (Coherencia)</option>
      <option value="5.5">5.5 RPM</option>
      <option value="5">5 RPM</option>
      <option value="4.5">4.5 RPM</option>
      <option value="4">4 RPM</option>
    </select>

    <div class="timer-display" id="timeRemaining">--:--</div>

    <div class="pacer-box">
      <div id="circle" class="circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>
  </div>

  <!-- Cámara y Lectura -->
  <div class="card">
    <video id="videoPreview" autoplay playsinline muted></video>
    <canvas id="canvas" width="50" height="50" style="display:none;"></canvas>

    <div class="metrics">
      <div>
        <div id="bpmVal" class="val">--</div>
        <small>BPM Actual</small>
      </div>
      <div>
        <div id="avgVal" class="val">--</div>
        <small>Promedio</small>
      </div>
    </div>

    <button id="btn">Iniciar Sesión</button>
  </div>

<script>
  let active = false;
  let track = null;
  let bpmHistory = [];
  let lastBeat = Date.now();
  let raw = [];
  let anim = null;
  let timerInterval = null;
  let timeLeft = 0;

  const video = document.getElementById('videoPreview');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const circle = document.getElementById('circle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgVal = document.getElementById('avgVal');
  const btn = document.getElementById('btn');
  const rpmSelect = document.getElementById('rpm');
  const timeSelect = document.getElementById('sessionTime');
  const timeRemaining = document.getElementById('timeRemaining');

  btn.addEventListener('click', async () => {
    if (!active) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
        try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e){}

        active = true;
        bpmHistory = [];
        raw = [];
        btn.textContent = "Detener";
        btn.style.background = "#ef4444";
        btn.style.color = "#fff";

        startTimer();
        runPacer();
        process();
      } catch (err) {
        alert("Error al abrir cámara: " + err);
      }
    } else {
      stop();
    }
  });

  function startTimer() {
    timeLeft = parseInt(timeSelect.value) * 60;
    updateTimerDisplay();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        stop();
        alert("¡Sesión finalizada!");
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    timeRemaining.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
  }

  function process() {
    if (!active) return;
    ctx.drawImage(video, 0, 0, 50, 50);
    const frame = ctx.getImageData(0, 0, 50, 50);
    let sum = 0;
    
    // Canal rojo
    for (let i = 0; i < frame.data.length; i += 4) {
      sum += frame.data[i];
    }
    let avg = sum / (frame.data.length / 4);

    raw.push(avg);
    if (raw.length > 30) raw.shift();
    
    let mean = raw.reduce((a,b) => a+b, 0) / raw.length;
    let now = Date.now();

    // Detección de pulso sensible
    if (avg > mean + 0.4 && (now - lastBeat) > 380) {
      let bpm = Math.round(60000 / (now - lastBeat));
      if (bpm >= 40 && bpm <= 180) {
        bpmVal.textContent = bpm;
        bpmHistory.push(bpm);
        avgVal.textContent = Math.round(bpmHistory.reduce((a,b) => a+b, 0) / bpmHistory.length);
      }
      lastBeat = now;
    }
    requestAnimationFrame(process);
  }

  function runPacer() {
    const rpm = parseFloat(rpmSelect.value);
    const ms = (60 / rpm) * 1000;
    const start = Date.now();

    function step() {
      if (!active) return;
      let elapsed = (Date.now() - start) % ms;
      let prog = elapsed / ms;

      if (prog < 0.5) {
        circle.style.transform = `scale(${1 + (prog * 2) * 1.5})`;
        pacerText.textContent = "Inhala";
      } else {
        circle.style.transform = `scale(${1 + ((1 - prog) * 2) * 1.5})`;
        pacerText.textContent = "Exhala";
      }
      anim = requestAnimationFrame(step);
    }
    step();
  }

  function stop() {
    active = false;
    if (track) track.stop();
    clearInterval(timerInterval);
    cancelAnimationFrame(anim);
    circle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    timeRemaining.textContent = "--:--";
    btn.textContent = "Iniciar Sesión";
    btn.style.background = "#38bdf8";
    btn.style.color = "#000";
  }
</script>
</body>
</html>
