<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biofeedback Cardiorrespiratorio - En Tu Límite</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --danger: #ef4444;
      --text: #f8fafc;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 450px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
    }
    h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); }
    
    /* Pacer Visual */
    .pacer-container {
      height: 170px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .pacer-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, #38bdf8 0%, #0284c7 100%);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
      transition: transform 0.1s linear;
    }
    .pacer-text {
      position: absolute;
      font-weight: bold;
      font-size: 1.1rem;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Muestra de Cámara y Dedo */
    .cam-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    #videoPreview {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      background: #000;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    /* Métricas */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .metric-box {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
    }
    .metric-val { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
    .metric-label { font-size: 0.8rem; opacity: 0.8; }

    /* Controles */
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }
    select { background: #334155; color: #fff; margin-bottom: 10px; }
    button { background: var(--accent); color: #0f172a; margin-top: 10px; }

    canvas { width: 100%; height: 80px; background: #020617; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <!-- Tarjeta Pacer de Respiración -->
  <div class="card">
    <h2>Pacer de Respiración</h2>
    <label for="rpm">Frecuencia objetivo:</label>
    <select id="rpm">
      <option value="6" selected>6 RPM (Coherencia Cardíaca)</option>
      <option value="5.5">5.5 RPM</option>
      <option value="5">5 RPM</option>
      <option value="4.5">4.5 RPM</option>
    </select>
    
    <div class="pacer-container">
      <div id="pacerCircle" class="pacer-circle"></div>
      <div id="pacerText" class="pacer-text">Listo</div>
    </div>
  </div>

  <!-- Tarjeta Sensor de Pulso por Cámara -->
  <div class="card">
    <h2>Sensor de Pulso PPG</h2>
    
    <div class="cam-box">
      <!-- Muestra de la cámara donde se ve el dedo -->
      <video id="videoPreview" autoplay playsinline muted></video>
      <span style="font-size:0.8rem; opacity:0.8;">Cubre totalmente la cámara trasera y la luz con tu dedo.</span>
    </div>

    <canvas id="camCanvas" width="50" height="50" style="display:none;"></canvas>

    <div class="metrics">
      <div class="metric-box">
        <div id="bpmVal" class="metric-val">--</div>
        <div class="metric-label">BPM Actual</div>
      </div>
      <div class="metric-box">
        <div id="avgBpmVal" class="metric-val">--</div>
        <div class="metric-label">Promedio Sesión</div>
      </div>
    </div>

    <!-- Gráfica de pulso tipo ECG -->
    <canvas id="ecgGraph" width="300" height="80"></canvas>

    <button id="startBtn">Iniciar Biofeedback</button>
  </div>
</div>

<script>
  let streaming = false;
  let videoTrack = null;
  let pacerAnimation = null;
  let bpmHistory = [];
  
  const video = document.getElementById('videoPreview');
  const camCanvas = document.getElementById('camCanvas');
  const camCtx = camCanvas.getContext('2d');
  const ecgCanvas = document.getElementById('ecgGraph');
  const ecgCtx = ecgCanvas.getContext('2d');
  
  const pacerCircle = document.getElementById('pacerCircle');
  const pacerText = document.getElementById('pacerText');
  const bpmVal = document.getElementById('bpmVal');
  const avgBpmVal = document.getElementById('avgBpmVal');
  const startBtn = document.getElementById('startBtn');
  const rpmSelect = document.getElementById('rpm');

  let rawSignals = [];
  let lastBeatTime = Date.now();

  startBtn.addEventListener('click', async () => {
    if (!streaming) {
      const ok = await startCamera();
      if (ok) {
        startPacer();
        startBtn.textContent = "Detener Sesión";
        startBtn.style.background = "var(--danger)";
        streaming = true;
      }
    } else {
      stopSession();
    }
  });

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: { exact: "environment" },
          width: { ideal: 320 },
          height: { ideal: 240 }
        }
      }).catch(async () => {
        // Fallback por si la cámara "environment" estricta no abre en algunos navegadores
        return await navigator.mediaDevices.getUserMedia({ video: true });
      });

      video.srcObject = stream;
      await video.play();

      videoTrack = stream.getVideoTracks()[0];
      
      // Intentar encender la linterna / flash
      try {
        const capabilities = videoTrack.getCapabilities();
        if (capabilities.torch) {
          await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
        }
      } catch (e) {
        console.log("No se pudo encender la linterna automáticamente:", e);
      }

      processVideoFrame();
      return true;
    } catch (err) {
      alert("Error al abrir la cámara: Asegúrate de otorgar los permisos en tu navegador.");
      return false;
    }
  }

  function processVideoFrame() {
    if (!streaming && video.paused) return;

    camCtx.drawImage(video, 0, 0, 50, 50);
    const frame = camCtx.getImageData(0, 0, 50, 50);
    let redSum = 0;

    for (let i = 0; i < frame.data.length; i += 4) {
      redSum += frame.data[i];
    }

    const redAvg = redSum / (frame.data.length / 4);
    detectPulse(redAvg);
    drawECG(redAvg);

    if (streaming) {
      requestAnimationFrame(processVideoFrame);
    }
  }

  function detectPulse(val) {
    rawSignals.push(val);
    if (rawSignals.length > 100) rawSignals.shift();

    const avg = rawSignals.reduce((a, b) => a + b, 0) / rawSignals.length;
    const now = Date.now();

    // Detección de pulso por pico de luz/rojo
    if (val > avg + 0.8 && (now - lastBeatTime) > 400) {
      const currentBpm = Math.round(60000 / (now - lastBeatTime));
      if (currentBpm >= 45 && currentBpm <= 180) {
        bpmVal.textContent = currentBpm;
        bpmHistory.push(currentBpm);
        
        const avgBpm = Math.round(bpmHistory.reduce((a, b) => a + b, 0) / bpmHistory.length);
        avgBpmVal.textContent = avgBpm;
      }
      lastBeatTime = now;
    }
  }

  function drawECG(val) {
    ecgCtx.fillStyle = "#020617";
    ecgCtx.fillRect(0, 0, ecgCanvas.width, ecgCanvas.height);
    
    ecgCtx.strokeStyle = "#38bdf8";
    ecgCtx.lineWidth = 2;
    ecgCtx.beginPath();
    
    const step = ecgCanvas.width / 100;
    const min = Math.min(...rawSignals);
    const max = Math.max(...rawSignals);
    const range = (max - min) || 1;

    for (let i = 0; i < rawSignals.length; i++) {
      const norm = (rawSignals[i] - min) / range;
      const y = ecgCanvas.height - (norm * (ecgCanvas.height - 20) + 10);
      if (i === 0) ecgCtx.moveTo(0, y);
      else ecgCtx.lineTo(i * step, y);
    }
    ecgCtx.stroke();
  }

  function startPacer() {
    const rpm = parseFloat(rpmSelect.value);
    const cycleTimeMs = (60 / rpm) * 1000; 
    const startTime = Date.now();

    function updatePacer() {
      if (!streaming) return;
      const elapsed = (Date.now() - startTime) % cycleTimeMs;
      const progress = elapsed / cycleTimeMs;

      if (progress < 0.5) {
        const scale = 1 + (progress * 2) * 1.6;
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Inhala...";
      } else {
        const scale = 1 + ((1 - progress) * 2) * 1.6;
        pacerCircle.style.transform = `scale(${scale})`;
        pacerText.textContent = "Exhala...";
      }
      pacerAnimation = requestAnimationFrame(updatePacer);
    }
    updatePacer();
  }

  function stopSession() {
    streaming = false;
    if (videoTrack) {
      videoTrack.stop();
    }
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(track => track.stop());
    }
    cancelAnimationFrame(pacerAnimation);
    pacerCircle.style.transform = "scale(1)";
    pacerText.textContent = "Listo";
    startBtn.textContent = "Iniciar Biofeedback";
    startBtn.style.background = "var(--accent)";
  }
</script>
</body>
</html>
